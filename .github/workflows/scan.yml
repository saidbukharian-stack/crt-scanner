# CRT Scanner - UZLUKSIZ skan (tez signal).
#
# Skaner har 2 daqiqada tekshiradi (uzluksiz loop), ~5h30m ishlaydi, keyin
# chiqadi; cron har 6 soatda qayta ishga tushiradi. Public repo = cheksiz bepul.
# Forward-test natijalari va holat cache'da (ishga tushishlar orasida saqlanadi);
# results.csv ish oxirida repoga commit qilinadi.
#
# Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, GEMINI_API_KEY, GROQ_API_KEY,
#   KNOWLEDGE_MD
name: CRT Scanner

on:
  schedule:
    - cron: "0 */6 * * *"    # har 6 soatda qayta ishga tushirish
  workflow_dispatch: {}

concurrency:
  group: crt-scanner
  cancel-in-progress: true   # yangi ishga tushish eskisini almashtiradi

permissions:
  contents: write   # results/ ni repoga commit qilish uchun

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 355      # ~5h55m
    env:
      DATA_SOURCE: yahoo
      SCAN_INTERVAL_MINUTES: "2"     # har 2 daqiqada skan (tez signal)
      MAX_RUNTIME_SEC: "19800"       # ~5h30m, keyin chiqadi (cron qayta ishga tushiradi)
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LLM_PRIMARY: gemini
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      # Bilim bazasi (signal LLM izohi uchun) - Secret'dan faylga tiklanadi
      - name: Bilim bazasini tiklash
        env:
          KNOWLEDGE_MD: ${{ secrets.KNOWLEDGE_MD }}
        run: |
          mkdir -p docs data results
          printf '%s' "$KNOWLEDGE_MD" > docs/MODEL_KNOWLEDGE.md

      # Signal holati, ochiq savdolar va forward-test natijalari cache'da
      # (uzluksiz kumulyativ saqlanadi)
      - name: Holatni tiklash
        uses: actions/cache/restore@v4
        with:
          path: |
            data/notified.json
            data/trades.json
            data/paper_account.json
            results/results_v2.csv
          key: scanner-state-${{ github.run_id }}
          restore-keys: scanner-state-

      - name: Skanerlash (uzluksiz)
        run: python scanner.py

      - name: Holatni saqlash
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/notified.json
            data/trades.json
            data/paper_account.json
            results/results_v2.csv
          key: scanner-state-${{ github.run_id }}

      # Forward-test natijalari (results/) repoga - telefondan ko'rish
      - name: Natijalarni repoga saqlash
        if: always()
        run: |
          if [ -n "$(ls -A results 2>/dev/null)" ]; then
            git config user.name "crt-scanner-bot"
            git config user.email "crt-scanner-bot@users.noreply.github.com"
            git add results/
            if ! git diff --cached --quiet; then
              git commit -m "Forward-test natijalari [skip ci]"
              git pull --rebase origin main
              git push
            fi
          fi

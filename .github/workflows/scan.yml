# CRT Scanner - GitHub Actions'da bepul ishlaydi (server o'rniga).
#
# Jadval: ish kunlari har 10 daqiqada + yakshanba kechqurun (bozor ochilishi).
# Eslatma: GitHub cron aniq vaqtda emas, ~3-15 daqiqa kechikish bilan
# ishlashi mumkin - alert tizimi uchun qabul qilingan kelishuv.
#
# Sozlash (Secrets): TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
#   GEMINI_API_KEY, GROQ_API_KEY (bepul LLM), KNOWLEDGE_MD (bilim bazasi matni)
name: CRT Scanner

on:
  schedule:
    - cron: "*/10 * * * 1-5"    # dushanba-juma (UTC)
    - cron: "*/10 21-23 * * 0"  # yakshanba 21:00 UTC dan - forex haftasi ochilishi
  workflow_dispatch: {}          # qo'lda ishga tushirish tugmasi

concurrency:
  group: crt-scanner
  cancel-in-progress: false

permissions:
  contents: write   # forward-test natijalarini (results/) repoga commit qilish uchun

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATA_SOURCE: yahoo
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LLM_PRIMARY: gemini
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Kutubxonalarni o'rnatish
        run: pip install -r requirements.txt

      # Bilim bazasi (docs/MODEL_KNOWLEDGE.md) public repoda yo'q (mualliflik
      # huquqi) - u Secret'da saqlanadi va shu yerda faylga tiklanadi
      - name: Bilim bazasini tiklash
        env:
          KNOWLEDGE_MD: ${{ secrets.KNOWLEDGE_MD }}
        run: |
          mkdir -p docs
          printf '%s' "$KNOWLEDGE_MD" > docs/MODEL_KNOWLEDGE.md

      # Yuborilgan signallar va ochiq savdolar cache'da saqlanadi
      # (Telegram Q&A endi alohida bot.yml workflow'ida)
      - name: Holatni tiklash
        uses: actions/cache/restore@v4
        with:
          path: |
            data/notified.json
            data/trades.json
          key: notified-state-${{ github.run_id }}
          restore-keys: notified-state-

      - name: Skanerlash
        run: python scanner.py --once

      - name: Holatni saqlash
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/notified.json
            data/trades.json
          key: notified-state-${{ github.run_id }}

      # Forward-test natijalari (results/results.csv) doimiy bo'lishi uchun
      # repoga commit qilinadi - telefondan ham ko'rish mumkin
      - name: Natijalarni repoga saqlash
        if: always()
        run: |
          if [ -f results/results.csv ]; then
            git config user.name "crt-scanner-bot"
            git config user.email "crt-scanner-bot@users.noreply.github.com"
            git add results/
            if ! git diff --cached --quiet; then
              git commit -m "Forward-test natijalari [skip ci]"
              git pull --rebase origin main
              git push
            fi
          fi
